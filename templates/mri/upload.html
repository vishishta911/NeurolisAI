
<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload MRI | NeuroLis AI</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">


</head>

<body class="bg-light">

{% include 'navbar.html' %}

<div class="container py-5">


<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow border-0">

            <div class="card-body p-4">

                <h2 class="mb-4">
                    Upload Brain MRI
                </h2>

                <form method="POST"
                      enctype="multipart/form-data">

                    <div class="mb-3">

                        <label class="form-label">
                            Select MRI Image
                        </label>

                        <input type="file"
                               name="mri_image"
                               class="form-control"
                               accept=".jpg,.jpeg,.png"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Notes (Optional)
                        </label>

                        <textarea class="form-control"
                            rows="4"
                            name="notes"
                            placeholder="Describe symptoms or observations..."></textarea>

                    </div>

                    <button type="submit"
                            class="btn btn-primary">

                        Analyze MRI

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>


</div>

</body>

</html>
